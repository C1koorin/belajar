name: Build Sancikrunul Kernel - POCO X3 Pro

on:
  workflow_dispatch:
    inputs:
      KERNELSU_NEXT:
        description: 'Enable KernelSU Next'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      UPLOAD_TO_RELEASE:
        description: 'Upload to GitHub Release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  KERNEL_SOURCE: https://github.com/AnymoreProject/kernel_xiaomi_vayu
  KERNEL_BRANCH: Anymore
  KERNEL_DEFCONFIG: vayu_defconfig
  KERNEL_NAME: sancikrunul
  KERNEL_VERSION: "1.0"
  DEVICE_CODENAME: vayu
  CLANG_URL: https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240625-release/Clang-19.0.0git-20240625.tar.gz
  CROSS_COMPILE: aarch64-linux-gnu-
  CROSS_COMPILE_ARM32: arm-linux-gnueabi-
  ANYKERNEL_URL: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL_BRANCH: master

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get autoremove -y
          sudo apt-get autoclean
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget zip unzip bc bison flex \
            libssl-dev libelf-dev python3 make \
            gcc g++ \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            cpio lz4 ccache \
            llvm lld clang

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 5G
          key: kernel-vayu-${{ github.sha }}
          restore-keys: kernel-vayu-

      - name: Setup Build Environment
        run: |
          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          if [ "${{ github.event.inputs.KERNELSU_NEXT }}" = "true" ]; then
            echo "WITH_KSU=true" >> $GITHUB_ENV
            echo "KSU_SUFFIX=-KSU" >> $GITHUB_ENV
          else
            echo "WITH_KSU=false" >> $GITHUB_ENV
            echo "KSU_SUFFIX=" >> $GITHUB_ENV
          fi
          echo "OUTPUT_NAME=Sancikrunul-v${{ env.KERNEL_VERSION }}-vayu-HyperOS2-${BUILD_DATE}" >> $GITHUB_ENV

      - name: Download Clang Toolchain
        run: |
          mkdir -p $HOME/clang
          wget -q "${{ env.CLANG_URL }}" -O $HOME/clang.tar.gz
          tar -xzf $HOME/clang.tar.gz -C $HOME/clang --strip-components=1
          rm $HOME/clang.tar.gz
          echo "CLANG_PATH=$HOME/clang/bin" >> $GITHUB_ENV

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch "${{ env.KERNEL_BRANCH }}" "${{ env.KERNEL_SOURCE }}" kernel_source
          echo "KERNEL_DIR=$(pwd)/kernel_source" >> $GITHUB_ENV

      - name: Set Custom Kernel Name
        run: |
          cd kernel_source
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${{ env.KERNEL_NAME }}\"/" arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }} || true

      - name: Integrate KernelSU Next
        if: env.WITH_KSU == 'true'
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
          echo "CONFIG_KSU_WITH_KPROBES=n" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}
          echo "CONFIG_KPROBES=n" >> arch/arm64/configs/${{ env.KERNEL_DEFCONFIG }}

      - name: Generate Defconfig
        run: |
          cd kernel_source
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          mkdir -p out
          make O=out ARCH=arm64 CC=clang CROSS_COMPILE=${{ env.CROSS_COMPILE }} CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} ${{ env.KERNEL_DEFCONFIG }}

      - name: Build Kernel
        run: |
          cd kernel_source
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          make O=out ARCH=arm64 SUBARCH=arm64 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=${{ env.CROSS_COMPILE }} CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} LOCALVERSION=-${{ env.KERNEL_NAME }} LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip -j$(nproc --all) 2>&1 | tee build.log
          if [ ! -f "out/arch/arm64/boot/Image.gz-dtb" ] && [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "BUILD FAILED - no output image found"
            tail -50 build.log
            exit 1
          fi
          echo "Build successful"

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 --branch "${{ env.ANYKERNEL_BRANCH }}" "${{ env.ANYKERNEL_URL }}" AnyKernel3
          cd kernel_source
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb ../AnyKernel3/
          fi
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image ../AnyKernel3/
          fi
          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            cp out/arch/arm64/boot/dtbo.img ../AnyKernel3/
          fi
          cd ../AnyKernel3
          echo "kernel.string=Sancikrunul Kernel by GitHub Actions" > anykernel.sh
          echo "do.devicecheck=1" >> anykernel.sh
          echo "do.modules=0" >> anykernel.sh
          echo "do.systemless=1" >> anykernel.sh
          echo "do.cleanup=1" >> anykernel.sh
          echo "do.cleanuponabort=0" >> anykernel.sh
          echo "device.name1=vayu" >> anykernel.sh
          echo "device.name2=bhima" >> anykernel.sh
          echo "supported.versions=" >> anykernel.sh
          echo "supported.patchlevels=" >> anykernel.sh
          echo ". tools/ak3-core.sh;" >> anykernel.sh
          echo "block=/dev/block/bootdevice/by-name/boot;" >> anykernel.sh
          echo "is_slot_device=0;" >> anykernel.sh
          echo "ramdisk_compression=auto;" >> anykernel.sh
          echo "patch_vbmeta_flag=auto;" >> anykernel.sh
          echo "split_boot;" >> anykernel.sh
          echo "flash_boot;" >> anykernel.sh
          ZIP_NAME="${{ env.OUTPUT_NAME }}${{ env.KSU_SUFFIX }}.zip"
          zip -r9 "../${ZIP_NAME}" . -x ".git*" -x "*.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}${{ env.KSU_SUFFIX }}
          path: |
            ${{ env.ZIP_NAME }}
            kernel_source/build.log
          retention-days: 7

      - name: Create GitHub Release
        if: github.event.inputs.UPLOAD_TO_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sancikrunul-v${{ env.KERNEL_VERSION }}-${{ env.BUILD_DATE }}
          name: Sancikrunul Kernel v${{ env.KERNEL_VERSION }} - POCO X3 Pro - ${{ env.BUILD_DATE }}
          body: |
            Sancikrunul Custom Kernel for POCO X3 Pro (vayu/bhima)

            Device: POCO X3 Pro (vayu / bhima)
            ROM Target: HyperOS 2
            KernelSU Next: ${{ env.WITH_KSU }}
            Build Date: ${{ env.BUILD_DATE }}

            Features:
            - Custom kernel name: Sancikrunul
            - KernelSU Next root manager
            - Based on AnymoreProject kernel_xiaomi_vayu
            - Optimized for HyperOS 2

            Installation:
            1. Boot into Custom Recovery (TWRP/OrangeFox)
            2. Flash the zip file
            3. If using KernelSU Next, install KernelSU Manager APK after boot
            4. Reboot
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
