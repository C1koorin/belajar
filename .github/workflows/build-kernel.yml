name: 🔨 Build Sancikrunul Kernel - POCO X3 Pro (vayu)

on:
  workflow_dispatch:
    inputs:
      KERNELSU_NEXT:
        description: 'Enable KernelSU Next'
        required: true
        default: true
        type: boolean
      UPLOAD_TO_RELEASE:
        description: 'Upload to GitHub Release'
        required: true
        default: true
        type: boolean
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'RELEASE'
        type: choice
        options:
          - RELEASE
          - DEBUG
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-kernel.yml'

env:
  # ─── Kernel Source ──────────────────────────────────────────────────────────
  KERNEL_SOURCE:      https://github.com/AnymoreProject/kernel_xiaomi_vayu
  KERNEL_BRANCH:      14.0
  KERNEL_DEFCONFIG:   vayu_defconfig

  # ─── Kernel Identity ────────────────────────────────────────────────────────
  KERNEL_NAME:        sancikrunul
  KERNEL_VERSION:     "1.0"
  DEVICE_CODENAME:    vayu
  DEVICE_FULLNAME:    "POCO X3 Pro"

  # ─── Boot Image Parameters (from stock HyperOS 2 boot.img) ──────────────────
  KERNEL_BASE:        "0x00000000"
  KERNEL_OFFSET:      "0x00008000"
  RAMDISK_OFFSET:     "0x01000000"
  TAGS_OFFSET:        "0x00000100"
  PAGE_SIZE:          "4096"
  CMDLINE:            "console=ttyMSM0,115200n8 androidboot.hardware=qcom androidboot.console=ttyMSM0 androidboot.memcg=1 lpm_levels.sleep_disabled=1 video=vfb:640x400,bpp=32,memsize=3072000 msm_rtb.filter=0x237 service_locator.enable=1 swiotlb=2048 loop.max_part=7 androidboot.usbcontroller=a600000.dwc3 buildvariant=user"
  HEADER_VERSION:     "2"

  # ─── Toolchain ──────────────────────────────────────────────────────────────
  CLANG_URL:          https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240625-release/Clang-19.0.0git-20240625.tar.gz
  CROSS_COMPILE:      aarch64-linux-gnu-
  CROSS_COMPILE_ARM32: arm-linux-gnueabi-

  # ─── Output ─────────────────────────────────────────────────────────────────
  ANYKERNEL_URL:      https://github.com/osm0sis/AnyKernel3
  ANYKERNEL_BRANCH:   master

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: 🚀 Build Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Free disk space ───────────────────────────────────────────────────
      - name: 🧹 Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get autoremove -y
          sudo apt-get autoclean
          df -h

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget zip unzip bc bison flex \
            libssl-dev libelf-dev libfl-dev \
            python3 python3-pip \
            make gcc g++ \
            aarch64-linux-gnu-gcc \
            arm-linux-gnueabi-gcc \
            binutils-aarch64-linux-gnu \
            binutils-arm-linux-gnueabi \
            cpio lz4 lzma zstd \
            ccache

      # ── 4. Setup ccache ──────────────────────────────────────────────────────
      - name: ⚡ Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 5G
          key: kernel-vayu-${{ github.sha }}
          restore-keys: kernel-vayu-

      # ── 5. Setup build environment variables ─────────────────────────────────
      - name: 🔧 Setup Build Environment
        run: |
          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

          # Determine KernelSU Next status
          if [ "${{ github.event.inputs.KERNELSU_NEXT }}" = "true" ]; then
            echo "WITH_KSU=true" >> $GITHUB_ENV
            echo "KSU_SUFFIX=-KSU" >> $GITHUB_ENV
          else
            echo "WITH_KSU=false" >> $GITHUB_ENV
            echo "KSU_SUFFIX=" >> $GITHUB_ENV
          fi

          # Output filename
          echo "OUTPUT_NAME=Sancikrunul-v${KERNEL_VERSION}-vayu-HyperOS2-${BUILD_DATE}" >> $GITHUB_ENV

      # ── 6. Download & setup Clang ─────────────────────────────────────────────
      - name: 🔨 Download Clang Toolchain
        run: |
          mkdir -p $HOME/clang
          echo "Downloading Clang..."
          wget -q --show-progress "${{ env.CLANG_URL }}" -O $HOME/clang.tar.gz
          tar -xzf $HOME/clang.tar.gz -C $HOME/clang --strip-components=1
          rm $HOME/clang.tar.gz
          echo "CLANG_PATH=$HOME/clang/bin" >> $GITHUB_ENV
          echo "Clang version: $(${HOME}/clang/bin/clang --version | head -1)"

      # ── 7. Clone kernel source ───────────────────────────────────────────────
      - name: 📦 Clone Kernel Source
        run: |
          echo "Cloning kernel source..."
          git clone --depth=1 \
            --branch "${{ env.KERNEL_BRANCH }}" \
            "${{ env.KERNEL_SOURCE }}" \
            kernel_source
          echo "Kernel source cloned successfully."
          cd kernel_source
          echo "KERNEL_DIR=$(pwd)" >> $GITHUB_ENV
          echo "Last commit: $(git log --oneline -1)"

      # ── 8. Set kernel name ───────────────────────────────────────────────────
      - name: ✏️ Set Custom Kernel Name
        run: |
          cd kernel_source

          # Patch Makefile to set kernel localversion
          sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"-${KERNEL_NAME}\"/" \
            arch/arm64/configs/${KERNEL_DEFCONFIG} 2>/dev/null || true

          # Also set in scripts/setlocalversion if needed
          # Ensure LOCALVERSION is set via make argument (most reliable)
          echo "LOCALVERSION=-${KERNEL_NAME}" >> $GITHUB_ENV
          echo "✅ Kernel name set to: ${{ env.KERNEL_NAME }}"

      # ── 9. Integrate KernelSU Next ────────────────────────────────────────────
      - name: 🔑 Integrate KernelSU Next
        if: env.WITH_KSU == 'true'
        run: |
          cd kernel_source
          echo "Integrating KernelSU Next..."

          # Download and apply KernelSU Next
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next

          # Verify integration
          if [ -d "KernelSU" ]; then
            echo "✅ KernelSU Next integrated successfully"
            echo "KSU version: $(cat KernelSU/kernel/Makefile | grep 'KERNELSU_VERSION' | head -1)"
          else
            echo "❌ KernelSU Next integration failed!"
            exit 1
          fi

          # Enable KernelSU in defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/${KERNEL_DEFCONFIG}
          echo "CONFIG_KSU_WITH_KPROBES=n" >> arch/arm64/configs/${KERNEL_DEFCONFIG}
          echo "CONFIG_KPROBES=n" >> arch/arm64/configs/${KERNEL_DEFCONFIG}

      # ── 10. Apply custom patches ─────────────────────────────────────────────
      - name: 🔧 Apply Custom Patches
        run: |
          cd kernel_source
          PATCHES_DIR="${GITHUB_WORKSPACE}/patches"

          if [ -d "$PATCHES_DIR" ] && [ "$(ls -A $PATCHES_DIR/*.patch 2>/dev/null)" ]; then
            echo "Applying patches..."
            for patch in $PATCHES_DIR/*.patch; do
              echo "Applying: $patch"
              git apply "$patch" && echo "✅ Applied: $(basename $patch)" || echo "⚠️ Failed: $(basename $patch)"
            done
          else
            echo "ℹ️ No patches to apply"
          fi

      # ── 11. Setup make variables ─────────────────────────────────────────────
      - name: ⚙️ Prepare Build Variables
        run: |
          PATH_EXPORT="${{ env.CLANG_PATH }}:$(aarch64-linux-gnu-gcc -print-search-dirs | grep install | awk '{print $2}'):/usr/bin:$PATH"
          echo "BUILD_PATH=$PATH_EXPORT" >> $GITHUB_ENV

          MAKE_ARGS="
            O=out
            ARCH=arm64
            SUBARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=${{ env.CROSS_COMPILE }}
            CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
            LOCALVERSION=-${{ env.KERNEL_NAME }}
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            -j$(nproc --all)
          "
          echo "MAKE_ARGS=$MAKE_ARGS" >> $GITHUB_ENV

      # ── 12. Generate defconfig ───────────────────────────────────────────────
      - name: ⚙️ Generate Defconfig
        run: |
          cd kernel_source
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          mkdir -p out

          make O=out \
               ARCH=arm64 \
               CC=clang \
               CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
               CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
               ${{ env.KERNEL_DEFCONFIG }}

          echo "✅ Defconfig generated"

      # ── 13. Build kernel ─────────────────────────────────────────────────────
      - name: 🔨 Build Kernel
        run: |
          cd kernel_source
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)

          echo "======================================"
          echo " Building Sancikrunul Kernel"
          echo " Device: POCO X3 Pro (vayu)"
          echo " KernelSU Next: ${{ env.WITH_KSU }}"
          echo " Threads: $(nproc --all)"
          echo "======================================"

          START_TIME=$(date +%s)

          make O=out \
               ARCH=arm64 \
               SUBARCH=arm64 \
               CC="ccache clang" \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
               CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }} \
               LOCALVERSION=-${{ env.KERNEL_NAME }} \
               LD=ld.lld \
               AR=llvm-ar \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) 2>&1 | tee build.log

          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "Build time: ${BUILD_TIME}s"

          # Verify output
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "✅ Kernel Image.gz-dtb found"
          elif [ -f "out/arch/arm64/boot/Image" ]; then
            echo "✅ Kernel Image found"
          else
            echo "❌ Kernel build FAILED - no output image!"
            cat build.log | tail -50
            exit 1
          fi

      # ── 14. Check kernel version / name ──────────────────────────────────────
      - name: 🔍 Verify Kernel Name
        run: |
          cd kernel_source
          if [ -f "out/include/generated/utsrelease.h" ]; then
            RELEASE=$(cat out/include/generated/utsrelease.h | grep UTS_RELEASE | awk '{print $3}' | tr -d '"')
            echo "✅ Kernel release string: $RELEASE"
          fi

      # ── 15. Package with AnyKernel3 ──────────────────────────────────────────
      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 \
            --branch "${{ env.ANYKERNEL_BRANCH }}" \
            "${{ env.ANYKERNEL_URL }}" \
            AnyKernel3

          # Copy kernel image(s)
          cd kernel_source
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            cp out/arch/arm64/boot/Image.gz-dtb ../AnyKernel3/
          fi
          if [ -f "out/arch/arm64/boot/Image" ]; then
            cp out/arch/arm64/boot/Image ../AnyKernel3/
          fi
          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            cp out/arch/arm64/boot/dtbo.img ../AnyKernel3/
          fi

          cd ../AnyKernel3

          # Configure AnyKernel3 for vayu
          cat > anykernel.sh << 'ANYKERNEL_EOF'
# AnyKernel3 - Sancikrunul Kernel for POCO X3 Pro (vayu)
# osm0sis @ xda-developers

### AnyKernel setup
properties() { '
kernel.string=Sancikrunul Kernel by GitHub Actions
do.devicecheck=1
do.modules=0
do.systemless=1
do.cleanup=1
do.cleanuponabort=0
device.name1=vayu
device.name2=bhima
supported.versions=
supported.patchlevels=
'; }

### AnyKernel install
# boot shell variables
block=/dev/block/bootdevice/by-name/boot;
is_slot_device=0;
ramdisk_compression=auto;
patch_vbmeta_flag=auto;

# import functions/variables and setup patching - see for reference
. tools/ak3-core.sh;

# boot install
split_boot;
flash_boot;
ANYKERNEL_EOF

          # Create flashable zip
          ZIP_NAME="${{ env.OUTPUT_NAME }}${{ env.KSU_SUFFIX }}.zip"
          zip -r9 "../${ZIP_NAME}" . -x ".git*" -x "*.zip"

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ Flashable zip created: $ZIP_NAME"
          ls -lh "../${ZIP_NAME}"

      # ── 16. Generate build info ───────────────────────────────────────────────
      - name: 📄 Generate Build Info
        run: |
          BUILD_MINS=$((BUILD_TIME / 60))
          BUILD_SECS=$((BUILD_TIME % 60))

          cat > build_info.txt << EOF
          ╔══════════════════════════════════════════╗
          ║         SANCIKRUNUL KERNEL BUILD INFO      ║
          ╚══════════════════════════════════════════╝

          Kernel Name    : Sancikrunul
          Version        : ${{ env.KERNEL_VERSION }}
          Device         : ${{ env.DEVICE_FULLNAME }} (${{ env.DEVICE_CODENAME }})
          ROM Target     : HyperOS 2
          KernelSU Next  : ${{ env.WITH_KSU }}
          Build Date     : ${{ env.BUILD_DATE }}
          Build Time     : ${BUILD_MINS}m ${BUILD_SECS}s
          Build Type     : ${{ github.event.inputs.BUILD_TYPE || 'RELEASE' }}

          ── Boot Image Params ──────────────────────
          Page Size      : ${{ env.PAGE_SIZE }}
          Header Version : ${{ env.HEADER_VERSION }}
          Kernel Addr    : 0x00008000
          Ramdisk Addr   : ${{ env.RAMDISK_OFFSET }}
          Tags Addr      : ${{ env.TAGS_OFFSET }}

          ── Kernel Source ──────────────────────────
          Source         : ${{ env.KERNEL_SOURCE }}
          Branch         : ${{ env.KERNEL_BRANCH }}
          Commit         : ${{ github.sha }}

          ── Toolchain ──────────────────────────────
          Compiler       : Clang 19
          Cross Compile  : ${{ env.CROSS_COMPILE }}

          ── Output ─────────────────────────────────
          Zip File       : ${{ env.ZIP_NAME }}
          EOF

          cat build_info.txt

      # ── 17. Upload artifact ───────────────────────────────────────────────────
      - name: 📤 Upload Kernel Zip (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}${{ env.KSU_SUFFIX }}
          path: |
            ${{ env.ZIP_NAME }}
            build_info.txt
            kernel_source/build.log
          retention-days: 7

      # ── 18. Create GitHub Release ─────────────────────────────────────────────
      - name: 🏷️ Create GitHub Release
        if: github.event.inputs.UPLOAD_TO_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "sancikrunul-v${{ env.KERNEL_VERSION }}-${{ env.BUILD_DATE }}"
          name: "Sancikrunul Kernel v${{ env.KERNEL_VERSION }} | ${{ env.DEVICE_FULLNAME }} | ${{ env.BUILD_DATE }}"
          body: |
            ## 🔥 Sancikrunul Custom Kernel

            **Device:** POCO X3 Pro (vayu / bhima)
            **ROM Target:** HyperOS 2
            **KernelSU Next:** ${{ env.WITH_KSU }}
            **Build Date:** ${{ env.BUILD_DATE }}

            ### 📋 Features
            - ✅ Custom kernel name: **Sancikrunul**
            - ✅ KernelSU Next (latest) root manager
            - ✅ Based on: [AnymoreProject/kernel_xiaomi_vayu](https://github.com/AnymoreProject/kernel_xiaomi_vayu)
            - ✅ Optimized for HyperOS 2

            ### ⚙️ Boot Image Info
            | Parameter | Value |
            |-----------|-------|
            | Page Size | 4096 |
            | Header Version | 2 |
            | Kernel Addr | 0x00008000 |
            | Ramdisk Addr | 0x01000000 |

            ### 📲 Installation
            1. Boot into Custom Recovery (TWRP/OrangeFox)
            2. Flash the zip file
            3. If using KernelSU Next — install KernelSU Manager APK after boot
            4. Reboot

            ### ⚠️ Notes
            - Always make a backup before flashing
            - Tested on HyperOS 2 only

            ---
            *Built with GitHub Actions | Commit: ${{ github.sha }}*
          files: |
            ${{ env.ZIP_NAME }}
            build_info.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
